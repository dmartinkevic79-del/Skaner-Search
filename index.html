<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sklad Scanner Dark Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Принудительная темная тема */
        :root {
            --bg: #000000;
            --card-bg: #111827;
            --primary: #3b82f6; /* Синий для кнопки копирования */
            --success: #10b981;
            --danger: #ef4444;
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #374151;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg) !important;
            color: var(--text) !important;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h2 { color: var(--text); text-align: center; margin-top: 0; }

        textarea {
            width: 100%;
            height: 140px;
            background: #000;
            color: #22c55e;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-start { background: var(--success); margin-top: 15px; }
        .btn-copy { background: var(--primary); }
        .btn-stop { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

        #reader {
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
        }

        /* Новая панель статистики */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
        }

        .stats-item { display: flex; flex-direction: column; width: 50%; }
        .label { font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .val { font-size: 24px; font-weight: bold; }

        .color-success { color: #10b981; }
        .color-danger { color: #ef4444; }

        /* Список найденного */
        .found-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .found-list li {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .found-list li strong { color: #10b981; }

        .alarm-flash { animation: flash-red 0.5s infinite; }
        @keyframes flash-red {
            0% { background: var(--bg); }
            50% { background: #7f1d1d; }
            100% { background: var(--bg); }
        }

        #screenScanner { display: none; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div id="screenSetup" class="card">
        <h2>Складской Поиск</h2>
        <textarea id="codesInput" placeholder="Вставьте список ID сюда..."></textarea>
        <button class="btn-start" onclick="startApp()">НАЧАТЬ ПОИСК</button>
    </div>

    <div id="screenScanner">
        <div class="card" style="padding: 5px;">
            <div id="reader"></div>
        </div>

        <div class="stats">
            <div class="stats-item">
                <span class="label color-success">Найдено:</span>
                <span class="val" id="countFound">0</span>
            </div>
            <div class="stats-item" style="text-align: right;">
                <span class="label color-danger">Осталось найти:</span>
                <span class="val" id="countLeft">0</span>
            </div>
        </div>

        <div class="card">
            <ul class="found-list" id="foundItemsList"></ul>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">СКОПИРОВАТЬ</button>
                <button class="btn-stop" onclick="stopApp()">ВЫХОД</button>
            </div>
        </div>
    </div>
</div>

<script>
    let targetCodes = new Set();
    let foundCodes = new Set();
    let html5QrCode;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function updateCounters() {
        const total = targetCodes.size;
        const found = foundCodes.size;
        const left = total - found;

        document.getElementById('countFound').innerText = found;
        document.getElementById('countLeft').innerText = left;

        if (left === 0 && total > 0) {
            setTimeout(() => alert("Отлично! Все ID из списка найдены."), 300);
        }
    }

    function startApp() {
        const input = document.getElementById('codesInput').value;
        const lines = input.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (!lines.length) return alert("Введите ID для поиска!");

        targetCodes = new Set(lines);
        foundCodes.clear();
        document.getElementById('foundItemsList').innerHTML = '';
        updateCounters();
        
        document.getElementById('screenSetup').style.display = 'none';
        document.getElementById('screenScanner').style.display = 'block';

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 20, qrbox: 250 },
            (text) => {
                const parts = text.split(':');
                const id = parts[2]; // Извлекаем ID (между 2 и 3 двоеточием)
                
                if (id && targetCodes.has(id) && !foundCodes.has(id)) {
                    foundCodes.add(id);
                    playSound();
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    
                    const b = document.getElementById('mainBody');
                    b.classList.add('alarm-flash');
                    setTimeout(() => b.classList.remove('alarm-flash'), 1000);

                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${id}</strong> <span>${new Date().toLocaleTimeString('ru-RU')}</span>`;
                    document.getElementById('foundItemsList').prepend(li);
                    
                    updateCounters();
                }
            }, () => {}
        ).catch(err => {
            alert("Ошибка доступа к камере. Включите камеру и используйте HTTPS.");
            stopApp();
        });
    }

    // Логика копирования для мессенджеров
    function copyToClipboard() {
        if (foundCodes.size === 0) {
            alert("Список пуст, копировать нечего.");
            return;
        }

        // Формируем красивый текст
        let textToCopy = `📦 Найденные товары (${foundCodes.size} шт.):\n`;
        foundCodes.forEach(id => {
            textToCopy += `${id}\n`;
        });

        navigator.clipboard.writeText(textToCopy).then(() => {
            // Визуальный отклик на кнопке
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            const originalColor = btn.style.background;
            
            btn.innerText = "✓ СКОПИРОВАНО";
            btn.style.background = "#10b981"; // Меняем цвет на зеленый
            
            // Возвращаем кнопку в исходное состояние через 2 секунды
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = originalColor;
            }, 2000);
        }).catch(err => {
            alert("Ошибка буфера обмена. Попробуйте обновить страницу.");
        });
    }

    function stopApp() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                location.reload(); // Перезагрузка для чистого старта
            }).catch(() => location.reload());
        } else {
            location.reload();
        }
    }
</script>
</body>
</html>
