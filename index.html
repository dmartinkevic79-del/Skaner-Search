    <style>
        :root {
            --bg: #000000;
            --card-bg: #111827;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f3f4f6;
            --border: #374151;
            --accent: #3b82f6;
            --torch: #f59e0b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        #flashOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; pointer-events: none;
        }

        .container { 
            max-width: 500px; margin: 0 auto; padding: 15px; 
            width: 100%; box-sizing: border-box; flex: 1;
            display: flex; flex-direction: column;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 700; color: var(--text); }

        textarea {
            width: 100%; height: 140px; background: #080c14; color: #22c55e;
            border: 1px solid var(--border); border-radius: 12px; padding: 12px;
            font-family: 'SF Mono', monospace; font-size: 16px; box-sizing: border-box;
            resize: none; outline: none; transition: border 0.2s;
        }
        textarea:focus { border-color: var(--accent); }

        button {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            font-size: 15px; font-weight: bold; color: white; cursor: pointer;
            text-transform: uppercase; transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }

        .btn-start { background: var(--success); }
        .btn-clear { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-copy { background: var(--accent); flex: 2; margin-top: 0; }
        .btn-stop { background: transparent; border: 1px solid #9ca3af; color: #9ca3af; flex: 1; margin-top: 0; }
        
        .btn-torch { 
            background: var(--torch); color: #000; margin-bottom: 15px; margin-top: 0;
            display: none; align-items: center; justify-content: center; gap: 8px;
        }

        #reader { border-radius: 14px; overflow: hidden; background: #000; border: 1px solid var(--border); }

        .stats {
            display: flex; justify-content: space-between; background: #1f2937;
            padding: 18px; border-radius: 16px; margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .val { font-size: 28px; font-weight: 900; display: block; line-height: 1; margin-top: 5px; }
        .label { font-size: 12px; opacity: 0.6; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        .found-list {
            list-style: none; padding: 0; margin: 0; max-height: 180px;
            overflow-y: auto; border: 1px solid var(--border); border-radius: 12px;
            background: #080c14;
        }
        .found-list li {
            padding: 12px 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 14px; align-items: center;
        }
        .found-list li:last-child { border-bottom: none; }
        .found-list li strong { color: var(--success); font-family: monospace; font-size: 16px; }
        .time-tag { font-size: 11px; opacity: 0.5; }

        .error-msg {
            background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger);
            color: #fca5a5; padding: 15px; border-radius: 12px; font-size: 14px;
            margin-bottom: 15px; display: none; text-align: center;
        }

        .attribution {
            text-align: center; font-size: 10px; color: #4b5563;
            padding: 20px 0; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0.7; font-weight: bold;
        }
        
        #screenScanner { display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="flashOverlay"></div>

<div class="container">
    <div id="screenSetup">
        <div class="card">
            <h2>Накладная</h2>
            <div id="cameraError" class="error-msg">⚠️ Доступ к камере заблокирован. Пожалуйста, разрешите камеру в настройках браузера.</div>
            <textarea id="codesInput" placeholder="Вставьте список ID (каждый с новой строки)..."></textarea>
            <button class="btn-start" id="startBtn" onclick="startApp()">ЗАПУСТИТЬ ПОИСК</button>
            <button class="btn-clear" onclick="clearMemory()">🗑 СБРОСИТЬ ВСЁ</button>
        </div>
    </div>

    <div id="screenScanner">
        <button id="torchBtn" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК: ВЫКЛ</button>
        
        <div class="card" style="padding: 5px;">
            <div id="reader"></div>
        </div>

        <div class="stats">
            <div><span class="label" style="color:var(--success)">НАЙДЕНО</span><span class="val" id="countFound" style="color:var(--success)">0</span></div>
            <div style="text-align:right"><span class="label" style="color:var(--danger)">ОСТАЛОСЬ</span><span class="val" id="countLeft" style="color:var(--danger)">0</span></div>
        </div>

        <div class="card">
            <ul class="found-list" id="foundItemsList"></ul>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">КОПИРОВАТЬ</button>
                <button class="btn-stop" onclick="pauseApp()">НАЗАД</button>
            </div>
        </div>
    </div>
</div>

<div class="attribution">

</div>

<script>

    const swCode = `

        const urlsToCache = [ location.href, 'https://unpkg.com/html5-qrcode' ];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache))));

    };
    document.getElementById('manifest-placeholder').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
