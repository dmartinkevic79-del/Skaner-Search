<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111827">
    <title>Sklad Scanner Pro</title>
    
    <link rel="manifest" id="manifest-placeholder">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111827;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f3f4f6;
            --border: #374151;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg); color: var(--text);
            min-height: 100vh; 
            /* Убрано overflow: hidden, чтобы можно было прокрутить до подписи */
        }

        #flashOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; pointer-events: none;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }

        .card {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 15px;
        }

        textarea {
            width: 100%; height: 120px; background: #000; color: #22c55e;
            border: 1px solid var(--border); border-radius: 10px; padding: 12px;
            font-family: monospace; font-size: 16px; box-sizing: border-box;
            resize: none;
        }

        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            text-transform: uppercase; transition: 0.1s;
        }
        button:active { opacity: 0.7; }

        .btn-start { background: var(--success); margin-top: 10px; }
        .btn-clear { background: transparent; border: 2px solid var(--danger); color: var(--danger); margin-top: 10px; }
        .btn-copy { background: #3b82f6; flex-grow: 2; }
        .btn-stop { background: transparent; border: 1px solid #9ca3af; color: #9ca3af; flex-grow: 1; }

        #reader { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); }

        .stats {
            display: flex; justify-content: space-between; background: #1f2937;
            padding: 15px; border-radius: 12px; margin: 10px 0;
        }
        .val { font-size: 26px; font-weight: 900; display: block; }
        .label { font-size: 12px; opacity: 0.7; font-weight: bold; }

        .found-list {
            list-style: none; padding: 0; margin: 0; max-height: 180px;
            overflow-y: auto; border: 1px solid var(--border); border-radius: 10px;
        }
        .found-list li {
            padding: 10px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 14px; align-items: center;
        }
        .found-list li strong { color: var(--success); font-family: monospace; font-size: 15px; }
        .time-tag { font-size: 11px; color: #9ca3af; background: #374151; padding: 2px 6px; border-radius: 4px; }

        .error-msg {
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger);
            color: #fca
