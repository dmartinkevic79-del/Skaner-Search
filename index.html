<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sklad Scanner Dark Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Принудительная темная тема */
        :root {
            --bg: #000000; /* Чистый черный для экономии заряда */
            --card-bg: #111827; /* Темно-серый/синий */
            --primary: #4f46e5;
            --success: #059669;
            --danger: #dc2626;
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #374151;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg) !important;
            color: var(--text) !important;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h2 { color: var(--text); text-align: center; margin-top: 0; }

        textarea {
            width: 100%;
            height: 140px;
            background: #000;
            color: #22c55e; /* Текст в поле ввода будет зеленым, как в терминале */
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-start { background: var(--primary); margin-top: 15px; }
        .btn-export { background: var(--success); }
        .btn-stop { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

        #reader {
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--border);
        }

        /* Панель статистики */
        .stats {
            display: flex;
            justify-content: space-between;
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        .stats-item { display: flex; flex-direction: column; }
        .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
        .val { font-size: 20px; font-weight: bold; }

        /* Список найденного */
        .found-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .found-list li {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .found-list li strong { color: #10b981; }

        /* Эффект тревоги */
        .alarm-flash { animation: flash-red 0.5s infinite; }
        @keyframes flash-red {
            0% { background: var(--bg); }
            50% { background: #7f1d1d; }
            100% { background: var(--bg); }
        }

        #screenScanner { display: none; }
    </style>
</head>
<body id="mainBody">

<div class="container">
    <div id="screenSetup" class="card">
        <h2>Загрузка ID</h2>
        <textarea id="codesInput" placeholder="Вставьте ID сюда..."></textarea>
        <button class="btn-start" onclick="startApp()">ЗАПУСТИТЬ</button>
    </div>

    <div id="screenScanner">
        <div class="card" style="padding: 5px;">
            <div id="reader"></div>
        </div>

        <div class="stats">
            <div class="stats-item">
                <span class="label">Найдено</span>
                <span class="val" id="progressCounter">0 / 0</span>
            </div>
            <div class="stats-item" style="text-align: right;">
                <span class="label">Таймер</span>
                <span class="val" id="sessionTimer">00:00</span>
            </div>
        </div>

        <div class="card">
            <ul class="found-list" id="foundItemsList"></ul>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-export" onclick="exportResults()">CSV</button>
                <button class="btn-stop" onclick="stopApp()">ВЫХОД</button>
            </div>
        </div>
    </div>
</div>

<script>
    let targetCodes = new Set();
    let foundCodes = new Set();
    let html5QrCode;
    let timer;
    let sec = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function startApp() {
        const input = document.getElementById('codesInput').value;
        const lines = input.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (!lines.length) return alert("Введите ID!");

        targetCodes = new Set(lines);
        foundCodes.clear();
        document.getElementById('foundItemsList').innerHTML = '';
        
        document.getElementById('screenSetup').style.display = 'none';
        document.getElementById('screenScanner').style.display = 'block';
        
        sec = 0;
        timer = setInterval(() => {
            sec++;
            document.getElementById('sessionTimer').innerText = 
                `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
        }, 1000);

        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 20, qrbox: 250 },
            (text) => {
                const id = text.split(':')[2];
                if (id && targetCodes.has(id) && !foundCodes.has(id)) {
                    foundCodes.add(id);
                    playSound();
                    if (navigator.vibrate) navigator.vibrate(400);
                    
                    const b = document.getElementById('mainBody');
                    b.classList.add('alarm-flash');
                    setTimeout(() => b.classList.remove('alarm-flash'), 1000);

                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${id}</strong> <span>${new Date().toLocaleTimeString()}</span>`;
                    document.getElementById('foundItemsList').prepend(li);
                    
                    document.getElementById('progressCounter').innerText = `${foundCodes.size} / ${targetCodes.size}`;
                }
            }, () => {}
        );
    }

    function exportResults() {
        let csv = "ID;Time\n";
        foundCodes.forEach(id => csv += id + ";" + new Date().toLocaleTimeString() + "\n");
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'export.csv';
        a.click();
    }

    function stopApp() {
        html5QrCode.stop().then(() => {
            clearInterval(timer);
            location.reload(); // Полная перезагрузка для сброса состояния
        });
    }
</script>
</body>
</html>
