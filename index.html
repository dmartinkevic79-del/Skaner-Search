<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sklad Scanner Alarm</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111827;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f3f4f6;
            --border: #374151;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Красный экран тревоги */
        #flashOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.7);
            z-index: 9999;
            display: none;
            pointer-events: none;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; position: relative; z-index: 10; }

        .card {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 15px;
        }

        textarea {
            width: 100%; height: 120px; background: #000; color: #22c55e;
            border: 1px solid var(--border); border-radius: 10px; padding: 12px;
            font-family: monospace; font-size: 16px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            text-transform: uppercase;
        }

        .btn-start { background: var(--success); margin-top: 10px; }
        .btn-clear { background: transparent; border: 2px solid var(--danger); color: var(--danger); margin-top: 10px; }
        .btn-copy { background: #3b82f6; width: 60%; }
        .btn-stop { background: transparent; border: 1px solid #9ca3af; color: #9ca3af; width: 35%; }

        #reader { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); }

        .stats {
            display: flex; justify-content: space-between; background: #1f2937;
            padding: 15px; border-radius: 12px; margin: 10px 0;
        }
        .val { font-size: 26px; font-weight: 900; display: block; }
        .label { font-size: 12px; opacity: 0.7; }

        .found-list {
            list-style: none; padding: 0; margin: 0; max-height: 150px;
            overflow-y: auto; border: 1px solid var(--border); border-radius: 10px;
        }
        .found-list li {
            padding: 10px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 14px;
        }
        
        #screenScanner { display: none; }
    </style>
</head>
<body>

<div id="flashOverlay"></div>

<div class="container">
    <div id="screenSetup" class="card">
        <h2 style="margin-top:0">Накладная</h2>
        <textarea id="codesInput" placeholder="Вставьте ID сюда..."></textarea>
        <button class="btn-start" id="startBtn" onclick="startApp()">ЗАПУСТИТЬ СКАНЕР</button>
        <button class="btn-clear" onclick="clearMemory()">ОЧИСТИТЬ ПАМЯТЬ</button>
    </div>

    <div id="screenScanner">
        <div class="card" style="padding: 5px; position: relative;">
            <div id="reader"></div>
        </div>

        <div class="stats">
            <div><span class="label">НАЙДЕНО</span><span class="val" id="countFound" style="color:var(--success)">0</span></div>
            <div style="text-align:right"><span class="label">ОСТАЛОСЬ</span><span class="val" id="countLeft" style="color:var(--danger)">0</span></div>
        </div>

        <div class="card">
            <ul class="found-list" id="foundItemsList"></ul>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">КОПИРОВАТЬ</button>
                <button class="btn-stop" onclick="pauseApp()">НАЗАД</button>
            </div>
        </div>
    </div>
</div>

<script>
    let targetCodes = new Set();
    let foundCodes = new Set();
    let foundLog = [];
    let html5QrCode;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Загрузка данных
    window.onload = () => {
        const savedInput = localStorage.getItem('codesInput');
        const savedFound = localStorage.getItem('foundCodes');
        const savedLog = localStorage.getItem('foundLog');

        if (savedInput) document.getElementById('codesInput').value = savedInput;
        if (savedFound) foundCodes = new Set(JSON.parse(savedFound));
        if (savedLog) foundLog = JSON.parse(savedLog);

        if (savedInput) document.getElementById('startBtn').innerText = "ПРОДОЛЖИТЬ";
    };

    function saveState() {
        localStorage.setItem('codesInput', document.getElementById('codesInput').value);
        localStorage.setItem('foundCodes', JSON.stringify(Array.from(foundCodes)));
        localStorage.setItem('foundLog', JSON.stringify(foundLog));
    }

    function clearMemory() {
        if (confirm("Удалить историю?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // ЗВУК И СВЕТ (Alarm)
    function triggerAlarm() {
        const overlay = document.getElementById('flashOverlay');
        overlay.style.display = 'block';
        setTimeout(() => overlay.style.display = 'none', 150);

        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square'; // Резкий звук
        osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);

        if (navigator.vibrate) navigator.vibrate(100);
    }

    function updateUI() {
        document.getElementById('countFound').innerText = foundCodes.size;
        document.getElementById('countLeft').innerText = Math.max(0, targetCodes.size - foundCodes.size);
        const list = document.getElementById('foundItemsList');
        list.innerHTML = '';
        foundLog.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${item.id}</strong> <span>${item.time}</span>`;
            list.appendChild(li);
        });
    }

    async function startApp() {
        const input = document.getElementById('codesInput').value;
        const lines = input.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (!lines.length) return alert("Список пуст!");

        targetCodes = new Set(lines);
        document.getElementById('screenSetup').style.display = 'none';
        document.getElementById('screenScanner').style.display = 'block';
        updateUI();

        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

        // Попытка запустить камеру с расширенной диагностикой
        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 250 } },
                (text) => {
                    const id = text.split(':')[2] || text; 
                    
                    if (targetCodes.has(id)) {
                        // Звенит ВСЕГДА, пока видит код
                        triggerAlarm();

                        // Добавляет в лог только если новый
                        if (!foundCodes.has(id)) {
                            foundCodes.add(id);
                            foundLog.unshift({ id: id, time: new Date().toLocaleTimeString('ru-RU') });
                            saveState();
                            updateUI();
                        }
                    }
                }
            );
        } catch (err) {
            alert("Ошибка камеры: " + err + "\n\n1. Проверьте разрешения в браузере.\n2. Закройте другие приложения с камерой.");
            pauseApp();
        }
    }

    function copyToClipboard() {
        let txt = `📦 Найдено (${foundCodes.size}):\n` + foundLog.map(i => i.id).join('\n');
        navigator.clipboard.writeText(txt).then(() => {
            alert("Скопировано!");
        });
    }

    function pauseApp() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('screenScanner').style.display = 'none';
                document.getElementById('screenSetup').style.display = 'block';
            }).catch(() => location.reload());
        } else { location.reload(); }
    }
</script>
</body>
</html>
